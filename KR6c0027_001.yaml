body:
  text: 隋大業年中三藏笈多譯歸命一切佛菩薩海等如是我聞一時世尊聞者遊行勝林中無親摶施與園中大比丘衆共半三十比丘百爾時世尊前分時上裙著已器上給衣持聞者大城摶為入爾時世尊聞者大城摶為行已作已食作已後食摶墮過器上給衣收攝兩足洗坐具世尊施設如是座中跏趺結直身作現前念近住爾時多比丘若世尊彼詣到已世尊兩足頂禮世尊邊三右繞作已一邊坐彼復時命者善實彼所如是衆聚集會坐爾時命者善實起坐一肩上著作已右膝輪地著已若世尊彼合掌向世尊邊如是言希有世尊乃至所有如來應正遍知菩薩摩訶薩順攝最勝順攝乃至所有如來應正遍知菩薩摩訶薩付囑最勝付囑彼云何世尊菩薩乘發行住應云何修行應云何心降伏應如是語已世尊命者善實邊如是言善善善實如是如是善實如是如是順攝如來菩薩摩訶薩最勝順攝付囑如來菩薩摩訶薩最勝付囑彼善實聽善善意念作説當如菩薩乘發行住應如修行應如心降伏應如是世尊命者善實世尊邊願欲聞世尊於此言此善實菩薩乘發行如是心發生應所有善實衆生衆生攝攝已卵生若胎生若濕生若化生若色若無色若想若無想若非想非無想所有衆生界施設已彼我一切無受餘涅槃界滅度應如是無量雖衆生滅度無有一衆生滅度有彼何所因若善實菩薩摩訶薩衆生想轉不彼菩薩摩訶薩名説應彼何所因不彼善實菩薩名説應若衆生想轉壽想若人想若轉雖然復次時善實不菩薩摩訶薩事住施與應無所住施與應不色住施與應不聲香味觸法中住施與應如是此善實菩薩摩訶薩施與應如不相想亦住彼何所因若善實菩薩摩訶薩不住施與彼所善實福聚不可量受取彼何意念善實可前方虛空量受取善實言不如此世尊世尊言如是右南後西高北下上方順不正方普十方可虛空量受取善實言不如此世尊世尊言如是如是善實如是如是若菩薩摩訶薩不住施與彼所善實福聚不可量受取雖然復次時善實如是菩薩乘發行施與應如不相想亦住彼何意念善實相具足如來見應善實言不世尊相具足如來見應彼何所因若彼如來相具足説彼如是非相具足如是語已世尊命者善實邊如是言所有善實相具足所有妄所有不相具足所有不妄名此相不相如來見應如是語已命者善實世尊邊如是言雖然世尊頗有衆生當有未來世後時後長時後分五百正法破壞時中轉時中若此中如是色類經中説中實想發生當有世尊言莫善實汝如是語雖然世尊頗有衆生當有未來世後時後長時後分五百正法破壞時中轉時中若此中如是色類經中説中實想發生當有雖然復次時善實當有未來世菩薩摩訶薩後分五百正法破壞時中轉時中戒究竟功德究竟智慧究竟不復次時彼善實菩薩摩訶薩一佛親近供養當有不一佛種植善根雖然復次時善實不一佛百千親近供養不一佛百千種植善根彼菩薩摩訶薩當有若此中如是色類中經句中説中一心淨信亦得當知彼善實如來佛智見彼善實如來佛眼一切彼善實無量福聚生當取當彼何所因不善實彼等菩薩摩訶薩我想轉不衆生想不壽想不人想轉不亦彼等善實菩薩摩訶薩法想轉無法想轉不亦彼等想無想轉不彼何所因若善實彼等菩薩摩訶薩法想轉彼如是彼等我取有衆生取壽取人取有若無法想轉彼如是彼等我取有衆生取壽取人取有彼何所因不復次時善實菩薩摩訶薩法取應不非法取應彼故此義意如來説筏喻法本解法如是捨應何況非法復次世尊命者善實邊如是言彼何意念善實有如來應正遍知無上正遍知證覺有復法如來説善實言如我世尊世尊説義解我無有一法若如來無上正遍知證覺無有一法若如來説彼何所因若彼如來法説不可取彼不可説不彼法非不法彼何因無為法顯明聖人世尊言彼何意念善實若有善家子若善家女若此三千大千世界七寶滿作已如來等應等正遍知等施與彼何意念善實雖然彼善家子若善家女若彼緣多福聚生善實言多世尊多善逝彼善家子若善家女若彼緣多福聚生彼何所因若彼世尊福聚如來説非聚彼世尊如來説福聚福聚者世尊言若復善實善家子若善家女若此三千大千世界七寶滿作已如來等應等正遍知等施與若此法本乃至四句等偈受已為他等分別廣説此彼緣多過福聚生無量不可數彼何所因此出善實如來應正遍知無上正遍知此生佛世尊彼何所因佛法佛法者善實非佛法如是彼彼故説名佛法者世尊言彼何意念善實雖然流入如是念我流入果得到善實言不如此世尊彼何所因不彼世尊一人彼故説名流入不色入不聲不香不味不觸不法入彼故説名流入者彼若世尊流入如是念我流入果得到彼如是彼所我取有衆生取壽取人取有世尊言彼何意念善實雖然一來如是念我一來果得到善實言不如此世尊彼何所因不一來如是念我一來果得到彼何所因不彼有法若一來人彼故説名一來者世尊言彼何意念善實雖然不來如是念我不來果得到善實言不如此世尊彼何所因不彼有法若不來入彼故説名不來者世尊言彼何意念善實雖然應如是念我應得到善實言不如此世尊彼何所因不彼世尊有法若應名彼故説名應者彼若世尊應如是念我應得到如是彼所我取有衆生取壽取人取有彼何所因我此世尊如來應正遍知無諍行最勝説我此世尊應離欲不我世尊如是念我此應者若我世尊如是念我應得到不我如來記説無諍行最勝善實善家子無所行彼故説名無諍行無諍行者世尊言彼何意念善實有一法若如來燈作如來應正遍知受取善實言不如此世尊無一法若如來燈作如來應正遍知受取世尊言若有善實菩薩摩訶薩如是語我國土莊嚴成就我者彼不如語彼何所因國土莊嚴者善實不莊嚴彼如來説彼故説名國土莊嚴者彼故此善實菩薩摩訶薩如是不住心發生應不色住心發生應不聲香味觸法住心發生應無所住心發生應譬如善實丈夫有此如是色我身有譬如善高山王彼何意念善實雖然彼大我身有善實言大世尊大善逝彼我身有彼何所因我身我身者世尊不有彼如來説彼故説名我身者不彼世尊有彼故説名我身者世尊言彼何意念善實所有恆伽大河沙彼所有如是恆伽大河有彼中若沙雖然彼多沙有善實言彼如是所有世尊多恆伽大河有何況若彼中沙世尊言欲我汝善實知我汝所有彼中恆伽大河中沙有彼所有世界有如是婦女若丈夫若七寶滿作已如來等應等正遍知等施與彼何意念善實雖然彼婦女若丈夫若彼緣多福聚生善實言多世尊多善逝彼婦女若丈夫若彼緣多福聚生無量不可數世尊言若復時善實善家子若善家女若彼所有世界七寶滿作已如來等應等正遍知等施與若此法本乃至四句等偈受已為他等分別廣説此如是彼緣多過福聚生無量不可數雖然復次時善實此中地分此法本乃至四句等偈為他等説若分別若廣説若彼地分支帝有天人阿修羅世何復言善實若此法本持當讀當誦當他等及分別廣説當最勝彼希有具足當有此中善實地分教師遊行別異尊重處相似共梵行如是語已命者善實世尊邊如是言何名此世尊法本云何及如此持我如是語已世尊命者善實邊如是言智慧彼岸到名此善實法本如是此持彼何所因若如是善實智慧彼岸到如來説彼如是非彼岸到彼故説名智慧彼岸到者彼何意念善實雖然有法若如來説善實言不如此世尊不有世尊法若如來説世尊言所有善實三千大千世界地塵有多有善實言多世尊多善逝彼地塵彼何所因若彼世尊地塵如來説非塵彼如來説彼故説名地塵者若彼世界如來説非界如來説彼故説名世界者世尊言彼何意念善實三十二大丈夫相如來應正遍知見應善實言不如此世尊不三十二大丈夫相如來應正遍知見應彼何所因所有世尊三十二大丈夫相如來説非相所有如來説彼故説名三十二大丈夫相者世尊言若復時善實婦女若丈夫若日日恆伽河沙等我身捨如是捨恆伽河沙等劫所有我身捨若此法本乃至四句等偈受已為他等分別此如是彼緣多過福聚生無量不可數爾時命者善實法疾轉力淚出彼淚拭已世尊邊如是言希有世尊最勝希有善逝所有此法本如來説此我世尊智生不我曾生來如是色類法本聞先最勝彼世尊希有具足衆生有當若此經中説中實想發生當彼何所因若此世尊實想彼如是非想彼故如來説實想實想者不我世尊希有若我此法本説中信我解我若彼世尊衆生有當未來世此法本受當持當讀當誦當他等及分別廣説當彼最勝希有具足有當雖然復次時世尊不彼等菩薩摩訶薩我想轉當不衆生想不壽想不人想轉當彼何所因若彼世尊我想彼如是非想若及如是衆生想壽想人想彼如是非想彼何所因一切想遠離此佛世尊如是語已世尊命者善實邊如是言如是如是善實如是如是如言汝最勝希有具足彼衆生有當若此經中説中不驚當不怖當不畏當彼何所因最勝彼岸到此善實如來説若及善實如來最勝彼岸到説彼無量亦佛世尊説彼故説名最勝彼岸到者雖然復次時善實若如來忍彼岸到彼如是非彼岸到彼何所因此時我善實惡王分別分肉割斷不時我彼中時我想若衆生想若壽想若人想若不我有想非想有彼何所因若我善實彼中時我想有瞋恨想亦我彼中時有衆生想壽想人想有瞋恨想亦我彼中時有念知我善實過去世五百生若我忍語仙人有彼中亦我不想有不衆生想不壽想不人想不亦我有想非想有彼故此善實菩薩摩訶薩一切想捨離無上正遍知心發生應不色住心發生應不聲香味觸住心發生應不法住非無法住心發生應無所住心發生應彼何所因若無所住彼如是住彼故如是如來説不色住菩薩摩訶薩施與應不聲香味觸法住施與應雖然復次時善實菩薩摩訶薩如是捨施應一切衆生為故彼何所因若如是善實衆生想彼如是非想若如是彼一切衆生如來説彼如是非衆生彼何所因真語善實如來實語如來不異語如來如語如來非不如語如來雖然復次時善實若如來法證覺説若思惟若不彼中實不妄譬如善實丈夫暗舍入不一亦見如是事墮菩薩見應若事墮施與譬如善實眼者丈夫顯明夜月出種種色見如是菩薩摩訶薩見應若事不墮施與雖然復次時善實若善家子善家女若此法本受當持當讀當誦當為他等及分別廣説當知彼善實如來佛智見彼善實如來佛眼一切彼善實衆生無量福聚生當取當若復時善實婦女若丈夫若前分時恆伽河沙等我身捨如是中分時如是晚分時恆伽河沙等我身捨以此因緣劫俱致那由多百千我身捨若此法本聞已不謗此如是彼緣多過福聚生無量不可數何復言若寫已受持讀誦為他等及分別廣説雖然復次時善實不可思不可稱此法本彼不可思如是果報觀察應此善實法本如來説勝乘發行衆生為故最勝乘發行衆生為故若此法本受當持當讀當誦當為他等及分別廣説當知彼善實如來佛智見彼善實如來佛眼一切彼善實衆生無量福聚具足有當不可思不可稱亦不可量福聚具足有當一切彼善實衆生我肩菩提持當有彼何所因不能善實此法本小信解者衆生聞不我見者不衆生見者不壽見者不人見者不菩薩誓衆生能聞受若持若讀若誦若無是處有雖然復次時善實此中地分此經廣説供養彼地分有當天人阿修羅世禮右繞作及彼地分有當支帝彼地分有當若彼善實善家子若